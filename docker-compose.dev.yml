# Development: API + Vite with bind mounts and hot reload
# Usage from repo root:
#   docker compose -f docker-compose.dev.yml up --build
#
# Open:
#   Frontend: http://localhost:5173
#   API:      http://localhost:3000
#
# From another device on the LAN, set VITE_API_BASE to your host IP when building the web
# service, or use this compose only on the same machine as the browser.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: alfa-leetcode-api-dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    environment:
      - PORT=3000
    command: npm run dev

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: alfa-dashboard-web-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - /app/node_modules
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-http://localhost:3000}
    depends_on:
      - api
